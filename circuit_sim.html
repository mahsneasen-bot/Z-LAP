<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<body>
<canvas id="simCanvas"></canvas>
<script>
// ══════════════════════════════════════════════════════
//  ١. الإعدادات الأساسية
// ══════════════════════════════════════════════════════
const canvas = document.getElementById('simCanvas');
const ctx    = canvas.getContext('2d');

let WIDTH  = window.innerWidth;
let HEIGHT = window.innerHeight;
canvas.width  = WIDTH;
canvas.height = HEIGHT;

const COLORS = {
    BG:       "rgb(18, 20, 25)",
    PANEL:    "rgb(28, 32, 40)",
    GRID:     "rgb(40, 45, 55)",
    TEXT:     "rgb(220, 220, 220)",
    ACCENT:   "rgb(0, 200, 150)",
    DANGER:   "rgb(255, 60, 60)",
    WARNING:  "rgb(255, 180, 0)",
    WIRE:     "rgb(150, 150, 150)",
    ELECTRON: "rgb(255, 255, 50)",
    NODE:     "rgb(200, 80, 80)",
    SELECTED: "rgb(100, 255, 100)",
    MAGNETIC: "rgb(100, 200, 255)",
    CAPACITOR:"rgb(50, 150, 200)",
    WHITE:    "rgb(255,255,255)",
    BLACK:    "rgb(0,0,0)"
};

const BAND_COLORS = [
    "rgb(0,0,0)","rgb(139,69,19)","rgb(255,0,0)",
    "rgb(255,140,0)","rgb(255,255,0)","rgb(0,128,0)",
    "rgb(0,0,255)","rgb(128,0,128)"
];

const GRID_SIZE = 20;
const snap = v => Math.round(v / GRID_SIZE) * GRID_SIZE;

// roundRect polyfill
CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    if(w<2*r)r=w/2; if(h<2*r)r=h/2;
    this.beginPath();
    this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r);
    this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);
    this.arcTo(x,y,x+w,y,r);
    this.closePath();
    return this;
};

// ══════════════════════════════════════════════════════
//  ٢. سجل الأحداث
// ══════════════════════════════════════════════════════
class Logger {
    static logs = [];
    static log(msg, color = COLORS.TEXT){
        if(!this.logs.length || this.logs[this.logs.length-1].msg !== msg){
            this.logs.push({msg, color, time: Date.now()});
        }
        if(this.logs.length > 5) this.logs.shift();
    }
}

// ══════════════════════════════════════════════════════
//  ٣. عقد وأسلاك
// ══════════════════════════════════════════════════════
class Node {
    constructor(parent, ox, oy){
        this.parent = parent;
        this.base_offset_x = ox; this.base_offset_y = oy;
        this.offset_x = ox; this.offset_y = oy;
        this.x = 0; this.y = 0;
        this.is_selected = false;
        this.voltage = 0.0;
        this.is_fixed = false;
        this.connections = [];
    }
    update_pos(){
        this.x = snap(this.parent.rect.x + this.parent.rect.w/2 + this.offset_x);
        this.y = snap(this.parent.rect.y + this.parent.rect.h/2 + this.offset_y);
    }
    check_click(pos){ return Math.hypot(pos.x-this.x, pos.y-this.y) < 30; }
    draw(ctx){
        ctx.fillStyle   = this.is_selected ? COLORS.SELECTED : COLORS.NODE;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 9, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = COLORS.WHITE;
        ctx.lineWidth   = 1.5;
        ctx.stroke();
    }
}

class Wire {
    constructor(na, nb){
        this.node_a = na; this.node_b = nb;
        this.resistance = 0.05;
        this.current = 0.0;
        this.electron_offset = 0.0;
    }
    get_points(){
        let mx = snap((this.node_a.x + this.node_b.x)/2);
        return [
            {x:this.node_a.x, y:this.node_a.y},
            {x:mx, y:this.node_a.y},
            {x:mx, y:this.node_b.y},
            {x:this.node_b.x, y:this.node_b.y}
        ];
    }
    check_click(pos){
        let pts = this.get_points();
        for(let i=0;i<pts.length-1;i++){
            let x1=pts[i].x,y1=pts[i].y,x2=pts[i+1].x,y2=pts[i+1].y;
            let dx=x2-x1, dy=y2-y1, len2=dx*dx+dy*dy;
            let t = len2>0 ? Math.max(0,Math.min(1,((pos.x-x1)*dx+(pos.y-y1)*dy)/len2)) : 0;
            let d = Math.hypot(pos.x-(x1+t*dx), pos.y-(y1+t*dy));
            if(d<25) return true;
        }
        return false;
    }
    draw(ctx){
        let pts = this.get_points();
        ctx.strokeStyle = COLORS.WIRE;
        ctx.lineWidth   = 4;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke();

        if(Math.abs(this.current) > 0.01){
            let speed = Math.min(Math.abs(this.current)*3.0, 15.0);
            this.electron_offset = (this.electron_offset + speed) % 30;
            let mx  = pts[1].x;
            let l1  = Math.abs(mx - this.node_a.x);
            let l2  = Math.abs(this.node_b.y - this.node_a.y);
            let l3  = Math.abs(this.node_b.x - mx);
            let tot = l1+l2+l3;
            if(tot===0) return;

            let dir = this.current > 0 ? 1 : -1;
            let dx1 = mx > this.node_a.x ? 1 : -1;
            let dy2 = this.node_b.y > this.node_a.y ? 1 : -1;
            let dx3 = this.node_b.x > mx ? 1 : -1;

            ctx.fillStyle = COLORS.ELECTRON;
            for(let i=0;i<Math.floor(tot/30)+1;i++){
                let d = ((this.electron_offset*dir)+(i*30));
                while(d<0) d+=tot;
                d %= tot;
                let ex,ey;
                if(d<=l1)      { ex=this.node_a.x+dx1*d;     ey=this.node_a.y; }
                else if(d<=l1+l2){ ex=mx;                    ey=this.node_a.y+dy2*(d-l1); }
                else             { ex=mx+dx3*(d-l1-l2);      ey=this.node_b.y; }
                ctx.beginPath();
                ctx.arc(ex,ey,3,0,Math.PI*2);
                ctx.fill();
            }
        }
    }
}

// ══════════════════════════════════════════════════════
//  ٤. المكونات الإلكترونية
// ══════════════════════════════════════════════════════
class Component {
    constructor(x,y,w,h,name){
        this.base_w = snap(w); this.base_h = snap(h);
        this.rect   = {x:snap(x), y:snap(y), w:this.base_w, h:this.base_h};
        this.name   = name;
        this.nodes  = [];
        this.is_dragging = false;
        this.is_selected = false;
        this.is_burnt    = false;
        this.current = 0.0; this.voltage_drop = 0.0; this.power = 0.0;
        this.temp_k   = 298.15;
        this.resistance = 10.0;
        this.rotation   = 0;
    }
    get node_a(){ return this.nodes[0] ?? null; }
    get node_b(){ return this.nodes[1] ?? null; }
    update(){
        this.rect.x = snap(this.rect.x);
        this.rect.y = snap(this.rect.y);
        this.nodes.forEach(n => n.update_pos());
    }
    rotate(){
        this.rotation = 1 - this.rotation;
        let cx = this.rect.x + this.rect.w/2;
        let cy = this.rect.y + this.rect.h/2;
        [this.rect.w, this.rect.h] = [this.rect.h, this.rect.w];
        this.rect.x = snap(cx - this.rect.w/2);
        this.rect.y = snap(cy - this.rect.h/2);
        this.nodes.forEach(n => { [n.offset_x, n.offset_y] = [n.offset_y, n.offset_x]; });
        this.update();
        Logger.log(`${this.name} Rotated.`, COLORS.ACCENT);
    }
    draw_base(ctx){
        if(this.is_selected){
            ctx.strokeStyle = COLORS.SELECTED;
            ctx.lineWidth   = 2;
            ctx.roundRect(this.rect.x-2, this.rect.y-2, this.rect.w+4, this.rect.h+4, 5).stroke();
        }
        this.nodes.forEach(n => n.draw(ctx));
    }
    check_click(pos){
        return pos.x>=this.rect.x && pos.x<=this.rect.x+this.rect.w &&
               pos.y>=this.rect.y && pos.y<=this.rect.y+this.rect.h;
    }
}

class Battery extends Component {
    constructor(x,y){
        super(x,y,80,120,"Battery");
        this.voltage=12.0; this.internal_r=1.0;
        this.nodes.push(new Node(this,0,-60), new Node(this,0,60));
        this.update();
    }
    draw(ctx){
        ctx.fillStyle="rgb(40,40,40)";
        ctx.roundRect(this.rect.x,this.rect.y,this.rect.w,this.rect.h,8).fill();
        ctx.fillStyle="rgb(200,150,50)";
        if(this.rotation===0){
            ctx.roundRect(this.rect.x,this.rect.y+40,this.rect.w,80,8).fill();
            ctx.fillStyle=COLORS.WHITE;
            ctx.fillRect(this.rect.x+this.rect.w/2-15,this.rect.y-10,10,10);
            ctx.fillRect(this.rect.x+this.rect.w/2+5, this.rect.y-10,16,10);
        } else {
            ctx.roundRect(this.rect.x,this.rect.y,80,this.rect.h,8).fill();
            ctx.fillStyle=COLORS.WHITE;
            ctx.fillRect(this.rect.x+this.rect.w,  this.rect.y+this.rect.h/2-15,10,10);
            ctx.fillRect(this.rect.x+this.rect.w,  this.rect.y+this.rect.h/2+5, 10,16);
        }
        ctx.fillStyle=COLORS.WHITE; ctx.font="bold 16px Consolas";
        ctx.fillText(`${this.voltage}V`, this.rect.x+10, this.rect.y+25);
        this.draw_base(ctx);
    }
}

class Resistor extends Component {
    constructor(x,y){
        super(x,y,120,40,"Resistor");
        this.resistance=10.0; this.max_power=100.0;
        this.nodes.push(new Node(this,-60,0), new Node(this,60,0));
        this.update();
    }
    draw(ctx){
        ctx.fillStyle = this.is_burnt ? "rgb(60,60,60)" : "rgb(210,180,140)";
        ctx.roundRect(this.rect.x,this.rect.y,this.rect.w,this.rect.h,15).fill();
        if(!this.is_burnt){
            let vs=String(Math.floor(this.resistance));
            let c1=BAND_COLORS[parseInt(vs[0])%BAND_COLORS.length];
            let c2=vs.length>1?BAND_COLORS[parseInt(vs[1])%BAND_COLORS.length]:COLORS.BLACK;
            let c3=vs.length>1?BAND_COLORS[vs.length-2]:COLORS.BLACK;
            [c1,c2,c3,"rgb(212,175,55)"].forEach((c,i)=>{
                ctx.fillStyle=c;
                if(this.rotation===0) ctx.fillRect(this.rect.x+25+i*20,this.rect.y,8,this.rect.h);
                else                  ctx.fillRect(this.rect.x,this.rect.y+25+i*20,this.rect.w,8);
            });
        } else {
            ctx.fillStyle=COLORS.DANGER; ctx.font="13px Consolas";
            ctx.fillText("BURNT",this.rect.x+5,this.rect.y-5);
        }
        ctx.fillStyle=COLORS.WHITE; ctx.font="13px Consolas";
        ctx.fillText(`${this.resistance}Ω`,this.rect.x+this.rect.w/2-15,this.rect.y+this.rect.h/2+5);
        this.draw_base(ctx);
    }
}

class Bulb extends Component {
    constructor(x,y){
        super(x,y,60,60,"Bulb");
        this.resistance=15.0; this.max_power=80.0;
        this.nodes.push(new Node(this,-30,30), new Node(this,30,30));
        this.update();
    }
    draw(ctx){
        let cx=this.rect.x+this.rect.w/2, cy=this.rect.y+this.rect.h/2;
        ctx.fillStyle = this.is_burnt ? "rgb(40,40,40)" :
                        (Math.abs(this.current)>0.1 ? "rgb(255,255,100)" : "rgb(120,120,120)");
        ctx.beginPath(); ctx.arc(cx,cy,30,0,Math.PI*2); ctx.fill();
        if(Math.abs(this.current)>0.1 && !this.is_burnt){
            ctx.strokeStyle="rgb(255,255,0)"; ctx.lineWidth=2;
            ctx.beginPath(); ctx.arc(cx,cy,38,0,Math.PI*2); ctx.stroke();
        }
        ctx.fillStyle="rgb(100,100,100)";
        if(this.rotation===0) ctx.fillRect(cx-15,this.rect.y+this.rect.h-10,30,20);
        else                  ctx.fillRect(this.rect.x+this.rect.w-10,cy-15,20,30);
        if(this.is_burnt){
            ctx.fillStyle=COLORS.DANGER; ctx.font="bold 16px Consolas";
            ctx.fillText("EXPLODED!",this.rect.x-15,this.rect.y-5);
        }
        this.draw_base(ctx);
    }
}

class Capacitor extends Component {
    constructor(x,y){
        super(x,y,60,60,"Capacitor");
        this.capacitance=0.01; this.charge=0.0; this.resistance=0.001;
        this.nodes.push(new Node(this,-30,0), new Node(this,30,0));
        this.update();
    }
    draw(ctx){
        ctx.fillStyle=COLORS.CAPACITOR;
        ctx.roundRect(this.rect.x,this.rect.y,this.rect.w,this.rect.h,5).fill();
        ctx.strokeStyle=COLORS.WHITE; ctx.lineWidth=4;
        let cx=this.rect.x+this.rect.w/2, cy=this.rect.y+this.rect.h/2;
        ctx.beginPath();
        if(this.rotation===0){
            ctx.moveTo(cx-10,this.rect.y+10);   ctx.lineTo(cx-10,this.rect.y+this.rect.h-10);
            ctx.moveTo(cx+10,this.rect.y+10);   ctx.lineTo(cx+10,this.rect.y+this.rect.h-10);
        } else {
            ctx.moveTo(this.rect.x+10,cy-10);   ctx.lineTo(this.rect.x+this.rect.w-10,cy-10);
            ctx.moveTo(this.rect.x+10,cy+10);   ctx.lineTo(this.rect.x+this.rect.w-10,cy+10);
        }
        ctx.stroke();
        let vc = this.capacitance>0 ? this.charge/this.capacitance : 0;
        ctx.fillStyle=COLORS.BLACK; ctx.font="13px Consolas";
        ctx.fillText(`${vc.toFixed(1)}V`,this.rect.x+15,this.rect.y+15);
        this.draw_base(ctx);
    }
}

class Switch extends Component {
    constructor(x,y){
        super(x,y,100,40,"Switch");
        this.is_closed=false; this.resistance=9999999.0;
        this.nodes.push(new Node(this,-50,0), new Node(this,50,0));
        this.update();
    }
    toggle(){
        this.is_closed=!this.is_closed;
        this.resistance=this.is_closed?0.01:9999999.0;
        Logger.log(`Switch ${this.is_closed?'Closed':'Opened'}.`,COLORS.WARNING);
    }
    draw(ctx){
        ctx.fillStyle="rgb(100,100,110)";
        ctx.roundRect(this.rect.x,this.rect.y,this.rect.w,this.rect.h,5).fill();
        ctx.strokeStyle=this.is_closed?COLORS.ACCENT:COLORS.DANGER;
        ctx.lineWidth=6;
        let cx=this.rect.x+this.rect.w/2, cy=this.rect.y+this.rect.h/2;
        ctx.beginPath();
        if(this.rotation===0){
            ctx.moveTo(this.rect.x+20,cy);
            ctx.lineTo(this.rect.x+this.rect.w-20, this.is_closed?cy:this.rect.y-20);
        } else {
            ctx.moveTo(cx,this.rect.y+20);
            ctx.lineTo(this.is_closed?cx:this.rect.x+this.rect.w+20, this.rect.y+this.rect.h-20);
        }
        ctx.stroke();
        this.draw_base(ctx);
    }
}

class Fuse extends Component {
    constructor(x,y){
        super(x,y,80,30,"Fuse");
        this.resistance=0.1; this.max_current=2.0;
        this.nodes.push(new Node(this,-40,0), new Node(this,40,0));
        this.update();
    }
    draw(ctx){
        ctx.fillStyle=this.is_burnt?"rgb(50,50,50)":"rgb(150,200,255)";
        ctx.roundRect(this.rect.x,this.rect.y,this.rect.w,this.rect.h,5).fill();
        let cx=this.rect.x+this.rect.w/2, cy=this.rect.y+this.rect.h/2;
        if(!this.is_burnt){
            ctx.strokeStyle=COLORS.DANGER; ctx.lineWidth=3; ctx.beginPath();
            if(this.rotation===0){ ctx.moveTo(this.rect.x+10,cy); ctx.lineTo(this.rect.x+this.rect.w-10,cy); }
            else                 { ctx.moveTo(cx,this.rect.y+10); ctx.lineTo(cx,this.rect.y+this.rect.h-10); }
            ctx.stroke();
        } else {
            ctx.fillStyle=COLORS.DANGER; ctx.font="13px Consolas";
            ctx.fillText("BLOWN",this.rect.x,this.rect.y-5);
        }
        this.draw_base(ctx);
    }
}

class Electromagnet extends Component {
    constructor(x,y){
        super(x,y,140,50,"Magnet");
        this.resistance=5.0; this.max_power=200.0;
        this.magnetic_field=0.0; this.pulse=0.0;
        this.nodes.push(new Node(this,-70,0), new Node(this,70,0));
        this.update();
    }
    draw(ctx){
        ctx.fillStyle=this.is_burnt?"rgb(50,50,50)":"rgb(100,100,110)";
        ctx.roundRect(this.rect.x,this.rect.y,this.rect.w,this.rect.h,5).fill();
        let cx=this.rect.x+this.rect.w/2, cy=this.rect.y+this.rect.h/2;
        if(!this.is_burnt){
            ctx.strokeStyle="rgb(180,110,50)"; ctx.lineWidth=2;
            for(let i=0;i<12;i++){
                ctx.beginPath();
                if(this.rotation===0) ctx.ellipse(this.rect.x+12+i*11,cy,7.5,20,0,0,Math.PI*2);
                else                  ctx.ellipse(cx,this.rect.y+12+i*11,20,7.5,0,0,Math.PI*2);
                ctx.stroke();
            }
            if(Math.abs(this.current)>0.1){
                this.pulse=(this.pulse+Math.abs(this.current))%50;
                ctx.strokeStyle=COLORS.MAGNETIC; ctx.lineWidth=2;
                ctx.beginPath(); ctx.arc(cx,cy,40+this.pulse,0,Math.PI*2); ctx.stroke();
                ctx.fillStyle="rgb(100,255,100)"; ctx.font="13px Consolas";
                ctx.fillText(`B: ${(this.magnetic_field*1000).toFixed(1)}mT`,this.rect.x,this.rect.y-10);
            }
        }
        this.draw_base(ctx);
    }
}

// ══════════════════════════════════════════════════════
//  ٥. محرك الفيزياء (Gauss-Seidel)
// ══════════════════════════════════════════════════════
class PhysicsEngine {
    static solve(components, wires, dt){
        let all_nodes = [];
        components.forEach(c=>{
            all_nodes.push(...c.nodes);
            if(c.node_a && c.node_b){
                c.node_a.connections=[]; c.node_b.connections=[];
                c.node_a.is_fixed=false; c.node_b.is_fixed=false;
            }
        });
        components.forEach(c=>{
            if(!c.is_burnt && c.node_a && c.node_b){
                let r = c instanceof Capacitor
                    ? (c.capacitance>0 ? c.resistance+(dt/c.capacitance) : 999999)
                    : c.resistance;
                c.node_a.connections.push({neighbor:c.node_b, res:r, comp:c});
                c.node_b.connections.push({neighbor:c.node_a, res:r, comp:c});
            }
        });
        wires.forEach(w=>{
            w.node_a.connections.push({neighbor:w.node_b, res:w.resistance, comp:w});
            w.node_b.connections.push({neighbor:w.node_a, res:w.resistance, comp:w});
        });
        let batteries = components.filter(c=>c instanceof Battery);
        if(batteries.length===0) return ["No Power Source Detected."];
        let bat = batteries[0];
        bat.node_b.voltage=0.0; bat.node_b.is_fixed=true;
        bat.node_a.voltage=bat.voltage; bat.node_a.is_fixed=true;
        let var_nodes = all_nodes.filter(n=>!n.is_fixed);
        for(let iter=0;iter<300;iter++){
            var_nodes.forEach(node=>{
                let sv=0, sr=0;
                node.connections.forEach(conn=>{
                    if(conn.res>0){
                        if(conn.comp instanceof Capacitor){
                            let vc=conn.comp.capacitance>0?conn.comp.charge/conn.comp.capacitance:0;
                            let sign=node===conn.comp.node_a?1:-1;
                            sv+=(conn.neighbor.voltage-(sign*vc))/conn.res;
                        } else {
                            sv+=conn.neighbor.voltage/conn.res;
                        }
                        sr+=1/conn.res;
                    }
                });
                if(sr>0) node.voltage=sv/sr;
            });
        }
        let formulas=["--- Circuit Math ---"];
        components.forEach(c=>{
            if(!c.node_a||!c.node_b) return;
            if(c.is_burnt){ c.current=c.voltage_drop=c.power=0; return; }
            c.voltage_drop=Math.abs(c.node_a.voltage-c.node_b.voltage);
            if(c instanceof Capacitor){
                let vc=c.capacitance>0?c.charge/c.capacitance:0;
                c.current=c.resistance>0?(c.node_a.voltage-c.node_b.voltage-vc)/c.resistance:0;
                c.charge+=c.current*dt;
            } else {
                c.current=c.resistance>0?c.voltage_drop/c.resistance:0;
            }
            c.power=c.voltage_drop*Math.abs(c.current);
            c.temp_k=298.15+c.power*2.0;
            if(c instanceof Electromagnet)
                c.magnetic_field=(4*Math.PI*1e-7)*(200/0.1)*c.current;
            if(c.max_power && c.power>c.max_power){
                c.is_burnt=true;
                Logger.log(`${c.name} BURNT (${c.power.toFixed(1)}W)`,COLORS.DANGER);
            }
            if(c instanceof Fuse && Math.abs(c.current)>c.max_current){
                c.is_burnt=true; c.resistance=9999999;
                Logger.log("FUSE BLOWN! Circuit Protected.",COLORS.WARNING);
            }
        });
        wires.forEach(w=>{
            w.current=w.resistance>0?(w.node_a.voltage-w.node_b.voltage)/w.resistance:0;
        });
        let tot=wires.reduce((s,w)=>s+((w.node_a===bat.node_a||w.node_b===bat.node_a)?Math.abs(w.current):0),0);
        if(tot>0.01){
            formulas.push(`Active Loop`,`I = ${tot.toFixed(2)} A`,`R_eq = ${(bat.voltage/tot).toFixed(2)} Ω`);
        } else {
            formulas.push("Open / Blocked");
        }
        return formulas;
    }
}

// ══════════════════════════════════════════════════════
//  ٦. واجهة المستخدم
// ══════════════════════════════════════════════════════
class UI {
    constructor(){
        this.tools=[
            {name:"Battery",   cls:Battery,       c:"rgb(80,80,80)"},
            {name:"Resistor",  cls:Resistor,      c:"rgb(210,180,140)"},
            {name:"Bulb",      cls:Bulb,          c:"rgb(255,255,100)"},
            {name:"Capacitor", cls:Capacitor,     c:COLORS.CAPACITOR},
            {name:"Switch",    cls:Switch,        c:"rgb(100,100,110)"},
            {name:"Fuse",      cls:Fuse,          c:"rgb(150,200,255)"},
            {name:"Magnet",    cls:Electromagnet, c:"rgb(100,100,110)"}
        ];
        this.PANEL_W   = 120;
        this.DASH_W    = window.innerWidth > 800 ? 280 : 0;
        this.CONSOLE_H = 110;
        this.tool_rects= this.tools.map((_,i)=>({x:10, y:60+i*75, w:100, h:45}));
    }
    draw_grid(ctx){
        ctx.fillStyle=COLORS.GRID;
        for(let x=this.PANEL_W; x<WIDTH-this.DASH_W; x+=GRID_SIZE)
            for(let y=0; y<HEIGHT-this.CONSOLE_H; y+=GRID_SIZE){
                ctx.beginPath(); ctx.arc(x,y,1,0,Math.PI*2); ctx.fill();
            }
    }
    draw_toolbar(ctx){
        ctx.fillStyle=COLORS.PANEL;
        ctx.fillRect(0,0,this.PANEL_W,HEIGHT);
        ctx.strokeStyle=COLORS.WIRE; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(this.PANEL_W,0); ctx.lineTo(this.PANEL_W,HEIGHT); ctx.stroke();
        ctx.fillStyle=COLORS.ACCENT; ctx.font="bold 18px Tahoma";
        ctx.fillText("PARTS",25,35);
        this.tools.forEach((t,i)=>{
            let r=this.tool_rects[i];
            ctx.fillStyle=t.c;
            ctx.roundRect(r.x,r.y,r.w,r.h,5).fill();
            ctx.fillStyle="rgb(20,20,20)"; ctx.font="bold 13px Consolas";
            ctx.fillText(t.name,r.x+8,r.y+28);
        });
    }
    get_tool(pos){
        for(let i=0;i<this.tool_rects.length;i++){
            let r=this.tool_rects[i];
            if(pos.x>=r.x&&pos.x<=r.x+r.w&&pos.y>=r.y&&pos.y<=r.y+r.h)
                return this.tools[i].cls;
        }
        return null;
    }
    draw_dashboard(ctx, comp, formulas){
        if(this.DASH_W===0) return;
        let px=WIDTH-this.DASH_W, py=0;
        ctx.fillStyle=COLORS.PANEL;
        ctx.fillRect(px,py,this.DASH_W,HEIGHT-this.CONSOLE_H);
        ctx.strokeStyle=COLORS.WIRE; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,HEIGHT-this.CONSOLE_H); ctx.stroke();
        let y=30; let tx=px+15;
        ctx.fillStyle=COLORS.ACCENT; ctx.font="bold 18px Tahoma";
        ctx.fillText("CIRCUIT MATH",tx,y); y+=35;
        ctx.fillStyle=COLORS.TEXT; ctx.font="12px Consolas";
        formulas.forEach(f=>{ ctx.fillText(f,tx,y); y+=20; });
        ctx.strokeStyle="rgb(100,100,100)"; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(tx,y+10); ctx.lineTo(WIDTH-15,y+10); ctx.stroke(); y+=40;
        if(comp){
            ctx.fillStyle="rgb(255,200,100)"; ctx.font="bold 18px Tahoma";
            ctx.fillText(`DATA: ${comp.name}`,tx,y);
            let val = comp instanceof Battery    ? `EMF: ${comp.voltage.toFixed(1)} V` :
                      comp instanceof Capacitor  ? `Cap: ${comp.capacitance.toFixed(3)} F` :
                                                   `Val: ${comp.resistance.toFixed(1)} Ω`;
            ctx.fillStyle=COLORS.ACCENT; ctx.font="bold 14px Consolas";
            ctx.fillText(val,tx,y+35);
            let cy2=y+80;
            ctx.fillStyle="rgb(40,40,40)"; ctx.fillRect(tx,cy2,250,100);
            let vh=Math.min((comp.voltage_drop/24)*100,100);
            let ih=Math.min((Math.abs(comp.current)/5)*100,100);
            ctx.fillStyle="rgb(100,150,255)"; ctx.fillRect(tx+20, cy2+100-vh, 35, vh);
            ctx.fillStyle="rgb(255,150,50)";  ctx.fillRect(tx+100,cy2+100-ih, 35, ih);
            ctx.fillStyle=COLORS.TEXT; ctx.font="12px Consolas";
            ctx.fillText(`${comp.voltage_drop.toFixed(1)}V`, tx+20,  cy2+115);
            ctx.fillText(`${Math.abs(comp.current).toFixed(1)}A`, tx+100, cy2+115);
        }
    }
    draw_console(ctx){
        ctx.fillStyle=COLORS.PANEL;
        ctx.fillRect(0,HEIGHT-this.CONSOLE_H,WIDTH,this.CONSOLE_H);
        ctx.strokeStyle=COLORS.GRID; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(0,HEIGHT-this.CONSOLE_H); ctx.lineTo(WIDTH,HEIGHT-this.CONSOLE_H); ctx.stroke();
        ctx.fillStyle=COLORS.ACCENT; ctx.font="bold 14px Tahoma";
        ctx.fillText("SYSTEM LOGS:", 20, HEIGHT-this.CONSOLE_H+22);
        Logger.logs.forEach((log,i)=>{
            ctx.fillStyle=log.color; ctx.font="13px Consolas";
            ctx.fillText(`> ${log.msg}`, 20, HEIGHT-this.CONSOLE_H+45+i*18);
        });
    }
}

// ══════════════════════════════════════════════════════
//  ٧. نظام إدارة المؤشر الموحّد (Pointer Events)
//     يغطي الماوس + اللمس بمعالج واحد
// ══════════════════════════════════════════════════════
const components = [];
const wires      = [];
const ui         = new UI();

// قطع افتراضية عند الفتح
components.push(new Battery(250, 200));
components.push(new Resistor(450, 200));

let dragItem      = null;
let activeNode    = null;
let dragOffset    = {x:0, y:0};
let tempWireEnd   = null;
let selectedWire  = null;   // السلك المحدد حالياً

// ── متغيرات لوحة تعديل القيمة (HTML overlay) ──
let valuePanel    = null;   // div الـ overlay

const activePointers = new Map();

function getPos(e){
    let rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

// ── إنشاء/إزالة لوحة تعديل القيمة ──
function showValuePanel(comp){
    removeValuePanel();
    if(!comp || comp instanceof Switch) return;

    // تحديد القيمة القابلة للتعديل
    let isVoltage = comp instanceof Battery;
    let isCap     = comp instanceof Capacitor;
    let label     = isVoltage ? "Voltage (V)" : isCap ? "Capacitance (F)" : "Resistance (Ω)";
    let current   = isVoltage ? comp.voltage : isCap ? comp.capacitance : comp.resistance;
    let step      = isVoltage ? 1 : isCap ? 0.001 : 1;
    let minVal    = isVoltage ? 1 : isCap ? 0.001 : 0.1;
    let maxVal    = isVoltage ? 120 : isCap ? 1 : 10000;

    // حساب موقع اللوحة فوق المكوّن
    let px = comp.rect.x + comp.rect.w/2;
    let py = comp.rect.y - 10;

    valuePanel = document.createElement('div');
    valuePanel.style.cssText = `
        position:fixed;
        left:${Math.min(px - 90, WIDTH - 200)}px;
        top:${Math.max(py - 110, 10)}px;
        width:180px;
        background:rgb(28,32,40);
        border:1px solid rgb(0,200,150);
        border-radius:10px;
        padding:12px 14px;
        z-index:9999;
        box-shadow:0 4px 20px rgba(0,0,0,0.7);
        font-family:Consolas,monospace;
        color:rgb(220,220,220);
        user-select:none;
    `;

    valuePanel.innerHTML = `
        <div style="font-size:11px;color:rgb(0,200,150);margin-bottom:8px;font-weight:bold;">${comp.name} — ${label}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
            <button id="vp_dec" style="
                width:34px;height:34px;font-size:20px;font-weight:bold;
                background:rgb(50,55,65);border:1px solid rgb(80,85,95);
                color:rgb(255,100,100);border-radius:6px;cursor:pointer;
                display:flex;align-items:center;justify-content:center;line-height:1;
            ">−</button>
            <input id="vp_input" type="number"
                value="${current}"
                min="${minVal}" max="${maxVal}" step="${step}"
                style="
                    width:72px;text-align:center;
                    background:rgb(18,20,25);border:1px solid rgb(0,200,150);
                    color:rgb(255,220,80);border-radius:6px;padding:6px 4px;
                    font-size:15px;font-family:Consolas,monospace;
                    outline:none;
                "
            />
            <button id="vp_inc" style="
                width:34px;height:34px;font-size:20px;font-weight:bold;
                background:rgb(50,55,65);border:1px solid rgb(80,85,95);
                color:rgb(100,220,100);border-radius:6px;cursor:pointer;
                display:flex;align-items:center;justify-content:center;line-height:1;
            ">+</button>
        </div>
        <button id="vp_close" style="
            width:100%;padding:5px;background:rgb(40,44,54);
            border:1px solid rgb(80,85,95);color:rgb(180,180,180);
            border-radius:6px;cursor:pointer;font-size:12px;
        ">✕ Close</button>
    `;
    document.body.appendChild(valuePanel);

    function applyVal(v){
        v = Math.max(minVal, Math.min(maxVal, parseFloat(v)||minVal));
        if(isVoltage)    comp.voltage      = v;
        else if(isCap)   comp.capacitance  = v;
        else             comp.resistance   = v;
        document.getElementById('vp_input').value = v;
        Logger.log(`${comp.name} → ${v}`, COLORS.WARNING);
    }

    document.getElementById('vp_dec').addEventListener('pointerdown', e=>{
        e.stopPropagation();
        applyVal((isVoltage?comp.voltage:isCap?comp.capacitance:comp.resistance) - step);
    });
    document.getElementById('vp_inc').addEventListener('pointerdown', e=>{
        e.stopPropagation();
        applyVal((isVoltage?comp.voltage:isCap?comp.capacitance:comp.resistance) + step);
    });
    document.getElementById('vp_input').addEventListener('change', e=>{
        e.stopPropagation();
        applyVal(e.target.value);
    });
    document.getElementById('vp_input').addEventListener('pointerdown', e=>e.stopPropagation());
    document.getElementById('vp_close').addEventListener('pointerdown', e=>{
        e.stopPropagation();
        removeValuePanel();
    });
}

function removeValuePanel(){
    if(valuePanel){ valuePanel.remove(); valuePanel=null; }
}

// ── حساب نقطة منتصف السلك (لوضع زر الحذف) ──
function wireMidpoint(w){
    let pts = w.get_points();
    let mid = Math.floor(pts.length/2);
    return {
        x: (pts[mid-1].x + pts[mid].x)/2,
        y: (pts[mid-1].y + pts[mid].y)/2
    };
}

// ── رسم زر ❌ لحذف السلك المحدد ──
function drawWireDeleteBtn(ctx, w){
    let m = wireMidpoint(w);
    let r = 14;
    // الدائرة الحمراء
    ctx.fillStyle = "rgb(220,50,50)";
    ctx.beginPath(); ctx.arc(m.x, m.y, r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "rgb(255,120,120)"; ctx.lineWidth = 2;
    ctx.stroke();
    // علامة X
    ctx.strokeStyle = COLORS.WHITE; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(m.x-6, m.y-6); ctx.lineTo(m.x+6, m.y+6);
    ctx.moveTo(m.x+6, m.y-6); ctx.lineTo(m.x-6, m.y+6);
    ctx.stroke();
    return {x:m.x-r, y:m.y-r, w:r*2, h:r*2};
}

// ── رسم زر ❌ لحذف القطعة المحددة (الميزة الجديدة المضافة) ──
function drawCompDeleteBtn(ctx, comp){
    let bx = comp.rect.x + comp.rect.w;
    let by = comp.rect.y;
    let r = 14;
    // الدائرة الحمراء
    ctx.fillStyle = "rgb(220,50,50)";
    ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "rgb(255,120,120)"; ctx.lineWidth = 2;
    ctx.stroke();
    // علامة X
    ctx.strokeStyle = COLORS.WHITE; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(bx-6, by-6); ctx.lineTo(bx+6, by+6);
    ctx.moveTo(bx+6, by-6); ctx.lineTo(bx-6, by+6);
    ctx.stroke();
}

// ── بدء الضغط ──
function onPointerDown(e){
    e.preventDefault();
    let pos = getPos(e);
    activePointers.set(e.pointerId, pos);

    // ٠. فحص زر حذف السلك أولاً
    if(selectedWire){
        let m = wireMidpoint(selectedWire);
        if(Math.hypot(pos.x-m.x, pos.y-m.y) < 18){
            let idx = wires.indexOf(selectedWire);
            if(idx > -1) wires.splice(idx, 1);
            selectedWire = null;
            Logger.log("Wire Deleted.", COLORS.DANGER);
            return;
        }
    }

    // ٠.٢ فحص زر حذف القطعة المحددة (تطبيق ميزتك المطلوبة)
    let selectedComp = components.find(c => c.is_selected);
    if(selectedComp){
        let bx = selectedComp.rect.x + selectedComp.rect.w;
        let by = selectedComp.rect.y;
        if(Math.hypot(pos.x - bx, pos.y - by) < 18){
            // أولاً: تنظيف وحذف جميع الأسلاك المرتبطة بهذه القطعة
            for(let i = wires.length - 1; i >= 0; i--){
                if(selectedComp.nodes.includes(wires[i].node_a) || selectedComp.nodes.includes(wires[i].node_b)){
                    wires.splice(i, 1);
                }
            }
            // ثانياً: حذف القطعة نفسها من المصفوفة
            let idx = components.indexOf(selectedComp);
            if(idx > -1) components.splice(idx, 1);
            removeValuePanel();
            Logger.log(`${selectedComp.name} Deleted.`, COLORS.DANGER);
            return;
        }
    }

    // ١. الضغط على شريط الأدوات لإضافة قطعة جديدة
    if(pos.x < ui.PANEL_W){
        let ToolClass = ui.get_tool(pos);
        if(ToolClass){
            let newComp = new ToolClass(pos.x - 40, pos.y - 20);
            components.push(newComp);
            dragItem = newComp;
            dragOffset = { x: pos.x - newComp.rect.x, y: pos.y - newComp.rect.y };
            components.forEach(c => c.is_selected = false);
            newComp.is_selected = true;
            showValuePanel(newComp);
        }
        return;
    }

    // ٢. فحص الضغط على العقد (بدء توصيل سلك)
    for(let c of components){
        for(let n of c.nodes){
            if(n.check_click(pos)){
                activeNode = n;
                tempWireEnd = { x: pos.x, y: pos.y };
                return;
            }
        }
    }

    // ٣. فحص الضغط على القطع (للسحب والتحديد)
    let clickedComp = null;
    for(let c of components){
        if(c.check_click(pos)){
            clickedComp = c;
            break;
        }
    }

    if(clickedComp){
        dragItem = clickedComp;
        dragOffset = { x: pos.x - clickedComp.rect.x, y: pos.y - clickedComp.rect.y };
        components.forEach(c => c.is_selected = false);
        clickedComp.is_selected = true;
        selectedWire = null;
        if(clickedComp instanceof Switch){
            clickedComp.toggle();
        } else {
            showValuePanel(clickedComp);
        }
        return;
    }

    // ٤. فحص الضغط على الأسلاك لتحديدها
    let clickedWire = null;
    for(let w of wires){
        if(w.check_click(pos)){
            clickedWire = w;
            break;
        }
    }

    if(clickedWire){
        selectedWire = clickedWire;
        components.forEach(c => c.is_selected = false);
        removeValuePanel();
        return;
    }

    // الضغط في الفراغ يلغي التحديدات
    components.forEach(c => c.is_selected = false);
    selectedWire = null;
    removeValuePanel();
}

// ── تحريك المؤشر (السحب) ──
function onPointerMove(e){
    e.preventDefault();
    let pos = getPos(e);
    activePointers.set(e.pointerId, pos);

    // سحب القطعة وإعادة تمركز اللوحات
    if(dragItem){
        dragItem.rect.x = snap(pos.x - dragOffset.x);
        dragItem.rect.y = snap(pos.y - dragOffset.y);
        dragItem.update();

        if(dragItem.is_selected && valuePanel){
            let px = dragItem.rect.x + dragItem.rect.w/2;
            let py = dragItem.rect.y - 10;
            valuePanel.style.left = `${Math.min(px - 90, WIDTH - 200)}px`;
            valuePanel.style.top = `${Math.max(py - 110, 10)}px`;
        }
    }

    // تحديث مكان السلك المؤقت
    if(activeNode && tempWireEnd){
        tempWireEnd.x = pos.x;
        tempWireEnd.y = pos.y;
    }
}

// ── رفع الإصبع أو الماوس ──
function onPointerUp(e){
    e.preventDefault();
    activePointers.delete(e.pointerId);

    // إنهاء توصيل السلك إذا أفلتناه فوق عقدة صالحة
    if(activeNode && tempWireEnd){
        let pos = getPos(e);
        let targetNode = null;
        for(let c of components){
            for(let n of c.nodes){
                if(n.check_click(pos) && n !== activeNode){
                    targetNode = n;
                    break;
                }
            }
            if(targetNode) break;
        }

        if(targetNode){
            let exists = wires.some(w => (w.node_a === activeNode && w.node_b === targetNode) || (w.node_a === targetNode && w.node_b === activeNode));
            if(!exists){
                wires.push(new Wire(activeNode, targetNode));
                Logger.log("Wire Connected.", COLORS.ACCENT);
            }
        }
    }

    dragItem = null;
    activeNode = null;
    tempWireEnd = null;
}

// ربط أحداث النوافذ والمؤشرات
canvas.addEventListener('pointerdown', onPointerDown);
canvas.addEventListener('pointermove', onPointerMove);
canvas.addEventListener('pointerup', onPointerUp);

window.addEventListener('resize', () => {
    WIDTH = window.innerWidth;
    HEIGHT = window.innerHeight;
    canvas.width = WIDTH;
    canvas.height = HEIGHT;
    ui.DASH_W = WIDTH > 800 ? 280 : 0;
});

// الضغط على مفتاح R بالكيبورد لتدوير المكون المحدد
window.addEventListener('keydown', e => {
    if(e.key.toLowerCase() === 'r'){
        let selectedComp = components.find(c => c.is_selected);
        if(selectedComp){
            selectedComp.rotate();
            if(valuePanel) showValuePanel(selectedComp);
        }
    }
});

// ══════════════════════════════════════════════════════
//  ٨. حلقة الرسم والتشغيل الرئيسية (Game Loop)
// ══════════════════════════════════════════════════════
let lastTime = Date.now();
let mathFormulas = [];

function loop(){
    let now = Date.now();
    let dt = (now - lastTime) / 1000;
    if(dt > 0.1) dt = 0.1; // كبح القفزات الزمنية الكبيرة
    lastTime = now;

    // تشغيل المحرك الفيزيائي وحساب الجهد والتيار
    mathFormulas = PhysicsEngine.solve(components, wires, dt);

    // مسح Canvas ورسم الخلفية والشبكة
    ctx.fillStyle = COLORS.BG;
    ctx.fillRect(0,0,WIDTH,HEIGHT);
    ui.draw_grid(ctx);

    // رسم الأسلاك الثابتة
    wires.forEach(w => w.draw(ctx));

    // رسم السلك التجريبي أثناء السحب والربط
    if(activeNode && tempWireEnd){
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.lineWidth = 3;
        ctx.setLineDash([6, 6]);
        ctx.beginPath();
        ctx.moveTo(activeNode.x, activeNode.y);
        ctx.lineTo(tempWireEnd.x, tempWireEnd.y);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // رسم القطع المكونة للدائرة
    components.forEach(c => c.draw(ctx));

    // رسم واجهة حذف الأسلاك عند تحديد سلك
    if(selectedWire){
        drawWireDeleteBtn(ctx, selectedWire);
    }

    // رسم واجهة زر حذف القطع الإلكترونية عند تحديد قطعة
    let currentSelectedComp = components.find(c => c.is_selected);
    if(currentSelectedComp){
        drawCompDeleteBtn(ctx, currentSelectedComp);
    }

    // رسم أشرطة المهام والـ Dashboards
    ui.draw_toolbar(ctx);
    ui.draw_dashboard(ctx, currentSelectedComp, mathFormulas);
    ui.draw_console(ctx);

    requestAnimationFrame(loop);
}

// تشغيل برنامجك
loop();

</script>
</body>
</html>
