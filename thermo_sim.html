<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-LAB | Thermodynamics Engine</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        /* إزالة أي حواف زائدة وجعل الشاشة سوداء بالكامل */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
        }
        
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <script>
        // ==========================================
        // 1. إعداد بيئة Three.js والمشهد (Scene)
        // ==========================================
        const scene = new THREE.Scene();
        
        // إعداد الكاميرا
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 14; // البعد عن الصندوق
        camera.position.y = 2;  // الارتفاع قليلاً لرؤية أفضل
        
        // إعداد المصير (Renderer)
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // ==========================================
        // 2. بناء غرفة الغاز (الصندوق الزجاجي)
        // ==========================================
        const size = 10;
        const th = 0.5; // سمك الجدران
        
        // خامة الجدران (زجاجية شفافة)
        const wallMat = new THREE.MeshBasicMaterial({
            color: 0xffffff, 
            transparent: true, 
            opacity: 0.1,
            wireframe: true // استخدام الشبكة السلكية لتبدو علمية أكثر
        });
        
        // دالة مساعدة لإنشاء الجدران
        const createWall = (x, y, z, w, h, d) => {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geometry, wallMat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            return mesh;
        };

        // بناء الجدران الأربعة والأرضية
        createWall(-size/2, 0, 0, th, size, size); // الجدار الأيسر
        createWall(size/2, 0, 0, th, size, size);  // الجدار الأيمن
        createWall(0, -size/2, 0, size, th, size); // الأرضية
        createWall(0, 0, -size/2, size, size, th); // الجدار الخلفي

        // ==========================================
        // 3. بناء السقف المتحرك (المكبس)
        // ==========================================
        const ceilGeo = new THREE.BoxGeometry(size - 0.2, th, size - 0.2);
        const ceilMat = new THREE.MeshBasicMaterial({
            color: 0x00ffcc, // لون مميز للمكبس
            transparent: true, 
            opacity: 0.4
        });
        const ceiling = new THREE.Mesh(ceilGeo, ceilMat);
        
        // الارتفاع الأولي للسقف
        let targetCeilingY = size / 2;
        ceiling.position.set(0, targetCeilingY, 0);
        scene.add(ceiling);

        // ==========================================
        // 4. نظام جزيئات الغاز (Particles System)
        // ==========================================
        const particles = [];
        const particleRadius = 0.2;
        const particleGeo = new THREE.SphereGeometry(particleRadius, 16, 16);

        // دالة إنشاء الجزيئات
        const createParticles = (num) => {
            for (let i = 0; i < num; i++) {
                // المادة الخاصة بالجسيم (تبدأ باللون السماوي = بارد/ضغط منخفض)
                const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
                const p = new THREE.Mesh(particleGeo, mat);
                
                // تحديد موقع عشوائي داخل الصندوق (أسفل السقف الحالي)
                const currentCeilingBottom = ceiling.position.y - th/2;
                p.position.set(
                    (Math.random() - 0.5) * (size - 2),
                    (Math.random() - 0.5) * (currentCeilingBottom + size/2 - 2) - size/2 + 1,
                    (Math.random() - 0.5) * (size - 2)
                );
                
                // إعطاء سرعة عشوائية متجهة (Vector3)
                p.userData = {
                    v: new THREE.Vector3(
                        (Math.random() - 0.5) * 10,
                        (Math.random() - 0.5) * 10,
                        (Math.random() - 0.5) * 10
                    ),
                    max_ratio: 1.0 // نسبة الضغط القصوى التي تعرض لها الجسيم
                };
                
                scene.add(p);
                particles.push(p);
            }
        };

        // إنشاء 50 جسيم كبداية
        createParticles(50);

        // ==========================================
        // 5. استقبال الأوامر من الواجهة الرئيسية (index.html)
        // ==========================================
        window.addEventListener('message', (event) => {
            const data = event.data;
            
            // أمر تغيير ارتفاع السقف (من السلايدر)
            if (data.action === 'set_height') {
                // السلايدر يرسل قيم من 2 إلى 10
                // نحولها لمعادلة تناسب أبعاد Three.js (-3 إلى +5)
                targetCeilingY = data.value - 5; 
            } 
            
            // أمر إضافة جزيئات جديدة (من الزر)
            else if (data.action === 'add_particles') {
                createParticles(10);
            }
        });

        // إرسال إشارة جاهزية للمحرك الرئيسي
        window.parent.postMessage('ENGINE_READY', '*');

        // ==========================================
        // 6. حلقة الفيزياء والحركة (Physics Loop)
        // ==========================================
        const dt = 0.016; // Time step (approx 60fps)

        function animate() {
            requestAnimationFrame(animate);
            
            // تحريك السقف بنعومة نحو الهدف المطلوب
            ceiling.position.y += (targetCeilingY - ceiling.position.y) * 0.1;
            
            // حساب المساحة المتاحة وحالة الضغط
            const cy = ceiling.position.y - th/2;
            const current_ratio = size / (cy + size/2 + 0.1);
            
            // تحديث حركة كل جسيم
            particles.forEach(p => {
                
                // تحديث نسبة الضغط لكل جسيم
                if (current_ratio > p.userData.max_ratio) {
                    p.userData.max_ratio = current_ratio;
                }
                
                // زيادة السرعة بناءً على الضغط (انخفاض الحجم يزيد التصادمات والسرعة)
                const speed_mult = p.userData.max_ratio;
                p.position.addScaledVector(p.userData.v, speed_mult * dt);
                
                // --------------------------------------
                // تغيير اللون حرارياً حسب نسبة الضغط
                // --------------------------------------
                if (p.userData.max_ratio > 1.8) {
                    p.material.color.setHex(0xff0000); // أحمر (حار جداً / ضغط عالي)
                } else if (p.userData.max_ratio > 1.3) {
                    p.material.color.setHex(0xffa500); // برتقالي (دافئ / ضغط متوسط)
                } else {
                    p.material.color.setHex(0x00ffff); // سماوي (بارد / ضغط منخفض)
                }
                
                // --------------------------------------
                // فيزياء الاصطدام بجدران الصندوق
                // --------------------------------------
                
                // اصطدام محور X (يمين ويسار)
                if (p.position.x > size/2 - particleRadius) { 
                    p.userData.v.x = -Math.abs(p.userData.v.x); 
                    p.position.x = size/2 - particleRadius;
                }
                else if (p.position.x < -size/2 + particleRadius) { 
                    p.userData.v.x = Math.abs(p.userData.v.x); 
                    p.position.x = -size/2 + particleRadius;
                }
                
                // اصطدام محور Y (السقف والأرضية)
                if (p.position.y > cy - particleRadius) { 
                    p.userData.v.y = -Math.abs(p.userData.v.y); 
                    p.position.y = cy - particleRadius;
                }
                else if (p.position.y < -size/2 + particleRadius) { 
                    p.userData.v.y = Math.abs(p.userData.v.y); 
                    p.position.y = -size/2 + particleRadius;
                }
                
                // اصطدام محور Z (الأمام والخلف)
                if (p.position.z > size/2 - particleRadius) { 
                    p.userData.v.z = -Math.abs(p.userData.v.z); 
                    p.position.z = size/2 - particleRadius;
                }
                else if (p.position.z < -size/2 + particleRadius) { 
                    p.userData.v.z = Math.abs(p.userData.v.z); 
                    p.position.z = -size/2 + particleRadius;
                }
            });
            
            // تدوير الكاميرا ببطء لتعطي منظر سينمائي 3D
            scene.rotation.y += 0.002;
            scene.rotation.x = Math.sin(Date.now() * 0.0005) * 0.05;
            
            // رسم المشهد
            renderer.render(scene, camera);
        }

        // بدء حلقة الحركة
        animate();

        // ==========================================
        // 7. التجاوب مع تغيير حجم الشاشة
        // ==========================================
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

    </script>
</body>
</html>
